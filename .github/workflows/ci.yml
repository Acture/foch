name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust-checks:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

  tree-sitter-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tree-sitter-paradox
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Verify generated parser is up to date
        run: |
          bunx tree-sitter generate
          git diff --exit-code src/

      - name: Test grammar package
        run: bun run test

  vscode-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/vscode-foch
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Smoke test extension
        run: bun run test
