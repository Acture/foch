name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --all --check

  rust-clippy:
    name: Rust clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-test:
    name: Rust test (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo test (merge-quality steam feature)
        run: cargo test -p foch-merge-quality --features steam

  tree-sitter-smoke:
    name: Tree-sitter smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tree-sitter-paradox
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v6
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      # Generated artifacts (src/grammar.json, src/node-types.json,
      # src/parser.c, src/tree_sitter/*) drift between tree-sitter-cli
      # versions even without grammar.js changes, so a strict
      # `git diff --exit-code src/` produces false positives. Re-add this
      # guard once the committed src/ is regenerated against the cli
      # version pinned by bun.lock (must be done on Linux/macOS/WSL).
      # - name: Verify generated parser is up to date
      #   run: |
      #     bunx tree-sitter generate
      #     git diff --exit-code src/grammar.json

      - name: Test grammar package
        run: bun run test

  vscode-smoke:
    name: VS Code smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/vscode-foch
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v6
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Smoke test extension
        run: bun run test

  ci-required:
    name: CI required
    runs-on: ubuntu-latest
    if: ${{ always() }}
    permissions: {}
    needs:
      - workflow-lint
      - rust-fmt
      - rust-clippy
      - rust-test
      - tree-sitter-smoke
      - vscode-smoke
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          for result in \
            "${{ needs.rust-fmt.result }}" \
            "${{ needs.rust-clippy.result }}" \
            "${{ needs.rust-test.result }}" \
            "${{ needs.tree-sitter-smoke.result }}" \
            "${{ needs.vscode-smoke.result }}"; do
            if [ "${result}" != "success" ]; then
              echo "Required CI job result: ${result}"
              exit 1
            fi
          done
