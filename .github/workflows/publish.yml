name: sync-homebrew-tap

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to sync into Homebrew tap"
        required: true
        type: string

permissions:
  contents: read

jobs:
  homebrew-tap:
    name: Update Homebrew tap
    uses: ./.github/workflows/sync-homebrew-tap.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit
