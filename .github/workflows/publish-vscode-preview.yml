name: publish-vscode-preview

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  publish-preview:
    name: Publish VS Code preview (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
          - runner: windows-latest
            target: win32-x64
          - runner: macos-14
            target: darwin-arm64
    defaults:
      run:
        working-directory: packages/vscode-foch
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build bundled server
        run: bun run prepare:server

      - name: Publish pre-release extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: bun run publish:pre-release
