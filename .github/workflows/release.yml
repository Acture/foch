name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package and release"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-cli-assets:
    name: Build CLI assets (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
            archive_ext: tar.gz
          - runner: windows-latest
            target: win32-x64
            archive_ext: zip
          - runner: macos-14
            target: darwin-arm64
            archive_ext: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          submodules: recursive

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --locked --bin foch

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/bin
          cp target/release/foch dist/bin/
          tar -C dist/bin -czf "dist/foch-${{ steps.meta.outputs.version }}-${{ matrix.target }}.${{ matrix.archive_ext }}" foch

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force dist/bin | Out-Null
          Copy-Item target/release/foch.exe dist/bin/
          Compress-Archive -Path dist/bin/* -DestinationPath "dist/foch-${{ steps.meta.outputs.version }}-${{ matrix.target }}.${{ matrix.archive_ext }}" -Force

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/*

  package-vsix:
    name: Package VSIX (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
          - runner: windows-latest
            target: win32-x64
          - runner: macos-14
            target: darwin-arm64
    defaults:
      run:
        working-directory: packages/vscode-foch
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Package VSIX
        run: bun run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: packages/vscode-foch/*.vsix

  build-source-archive:
    name: Build source archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          submodules: recursive

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create source tarball
        shell: bash
        run: |
          version="${{ steps.meta.outputs.version }}"
          root="foch-${version}"
          mkdir -p dist stage/"${root}"
          rsync -a \
            --exclude='.git' \
            --exclude='.direnv' \
            --exclude='target' \
            --exclude='node_modules' \
            ./ stage/"${root}"/
          tar -C stage -czf "dist/${root}-source.tar.gz" "${root}"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: dist/*

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-cli-assets
      - package-vsix
      - build-source-archive
    permissions:
      contents: write
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          version="${{ steps.meta.outputs.version }}"
          extra_args=()
          if [[ "${tag}" == *-* ]]; then
            extra_args+=(--prerelease)
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* \
              --title "Foch ${version}" \
              --generate-notes \
              "${extra_args[@]}"
          fi

  homebrew-tap:
    name: Update Homebrew tap
    if: ${{ vars.HOMEBREW_TAP_REPO != '' }}
    runs-on: ubuntu-latest
    needs:
      - github-release
      - build-source-archive
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          repo="${GITHUB_REPOSITORY}"
          url="https://github.com/${repo}/releases/download/${tag}/foch-${version}-source.tar.gz"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Download release source tarball
        shell: bash
        run: |
          curl -fsSL "${{ steps.meta.outputs.url }}" -o source.tar.gz
          sha256="$(sha256sum source.tar.gz | cut -d' ' -f1)"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
        id: archive

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render formula
        shell: bash
        run: |
          mkdir -p tap/Formula
          ./scripts/render_homebrew_formula.sh \
            "${{ steps.meta.outputs.repo }}" \
            "${{ steps.meta.outputs.version }}" \
            "${{ steps.meta.outputs.url }}" \
            "${{ steps.archive.outputs.sha256 }}" \
            > tap/Formula/foch.rb

      - name: Commit and push formula update
        shell: bash
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/foch.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "foch ${{ steps.meta.outputs.version }}"
          git push
