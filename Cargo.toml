[package]
name = "foch"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5.51", features = ["derive"] }
clap-verbosity-flag = { version = "3.0.4", default-features = false, features = ["tracing"] }
console = "0.16.1"
dirs = "6.0.0"
home = "0.5.12"
jomini = "0.29.0"
regex = "1.12.2"
serde = { version = "1.0.219", features = ["derive", "rc"] }
serde_json = "1.0.145"
toml = "0.9.8"
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "fmt"] }
walkdir = "2.5.0"

[target.'cfg(windows)'.dependencies]
winreg = "0.55.0"

[dev-dependencies]
tempfile = "3.15.0"

[[bin]]
name = "foch-cli"
path = "src/main.rs"

[lib]
name = "foch"
path = "src/lib.rs"
