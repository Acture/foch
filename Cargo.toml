[package]
name = "foch"
version = "0.1.0"
edition = "2024"

[dependencies]
notify = "8.1.0"
serde = { version = "1.0.219", features = ["derive", "rc"] }
tempfile = "3.20.0"
typed-builder = "0.21.0"
log = "0.4.27"
tree-sitter-paradox = "0.2.0"
tree-sitter = "0.25.8"
blake3 = "1.8.2"
dialoguer = "0.11.0"
atty = "0.2.14"
shell-words = "1.1.0"
clap = "4.5.50"
jomini = "0.29.0"

[[bin]]
name = "foch-cli"
path = "src/cli.rs"

